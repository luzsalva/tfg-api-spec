openapi: 3.1.0
info:
  title: Web App para la gestión de listas de deseos
  description: API REST para gestionar listas de deseos y Donaciones
  version: 1.0.0

servers:
  - url: http://localhost:8080/api
    description: Servidor local

tags:
  - name: Autenticación
    description: Operaciones relacionadas con la autenticación de usuarios
  - name: children
    description: Operaciones relacionadas con los usuarios de tipo niño
  - name: users
    description: Operaciones relacionadas con los usuarios (niños y adultos)
  - name: items
    description: Operaciones relacionadas con los ítems de las listas de deseos
  - name: donacion
    description: Operaciones relacionadas con las donaciones de ítems

security:
  - bearerAuth: []

paths:

/auth/login:
  post:
    security: []
    tags: [Autenticación]
    summary: Iniciar sesión 
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LoginRequest'
    responses:
      '200':
        description: Inicio de sesión completado correctamente
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginResponse'
      '401':
        description: Credenciales inválidas
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/auth/logout:
  post:
    security: []
    tags: [Autenticación]
    summary: Cerrar sesión invalidando el token JWT del usuario
    responses:
      '204':
        description: Cierre de sesión completado correctamente
      '401':
        description: Usuario no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/auth/register:
  post:
    tags: [Autenticación]
    summary: Registrar un nuevo usuario (niño o adulto)
    description: El campo rol determina el tipo de usuario a registrar
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RegisterRequest'
    responses:
      '201':
        description: Usuario registrado correctamente
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Usuario'
      '400':
        description: Faltan datos de entrada o tienen un formato incorrecto
        content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      '409':
        description: El email ya está registrado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/children/{childId}:
  get:
    tags: [children]
    summary: Obtener información (perfil) de un niño por su id
    parameters:
      - name: childId
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: Perfil infantil encontrado correctamente
        content:
            application/json:
              schema:
                $ref: '#/components/schemas/perfilUsuario'
      '404':
        description: Perfil infantil no encontrado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/children/{childId}/validar:
  patch:
    tags: [children]
    summary: Validar el perfil de un niño por su id
    description: Cambia el estado del perfil del niño a "validado" para que pueda empezar a publicar deseos. 
                 Solo los validadores pueden realizar esta acción.
    parameters:
      - name: childId
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - validado
            properties:
              validado:
                type: boolean
                description: Indica si el perfil del niño ha sido validado o no
              comentario:
                type: string
                description: Comentario del validador sobre la validación del perfil infantil
    responses:
      '200':
        description: Perfil infantil validado correctamente
        content:
            application/json:
              schema:
                $ref: '#/components/schemas/perfilUsuario'
      '400':
        description: Datos inválidos
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '401':
        description: Validador no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '403':
        description: Usuario autenticado no es un validador
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Perfil infantil no encontrado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/users 
  get:
    tags: [users]
    summary: Buscar perfiles de donantes por filtros opcionales
    parameters:
      - name: nombre
        in: query
        required: false
        schema:
          type: string
      - name: apellidos
        in: query
        required: false
        schema:
          type: string
      - name: minDonaciones
        in: query
        required: false
        schema:
          type: integer
    responses:
      '200':
        description: Lista de perfiles de donantes obtenida correctamente
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/perfilUsuario'
      '400':
        description: Filtros con formato incorrecto
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
/users/{userId}:
  patch:
    tags: [users]
    summary: Actualizar perfil de un usuario por su id
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              nombre:
                type: string
              apellidos:
                type: string
              fechaNacimiento:
                type: string
                format: date
              direccion:
                type: string
              descripcion:
                type: string
    responses:
      '200':
        description: Perfil de usuario actualizado correctamente
        content:
            application/json:
              schema:
                $ref: '#/components/schemas/perfilUsuario'
      '400':
        description: Faltan datos de entrada o tienen un formato incorrecto
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Perfil de usuario no encontrado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/items/{itemId}:
  get:
    tags: [items]
    summary: Obtener información detallada de un ítem por su id
    description: Obtener información detallada de un ítem, ya sea de 
                 la lista de deseos o del buscador de ítems
    parameters:
      - name: itemId
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: Ítem encontrado correctamente
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Item'
      '404':
        description: El ítem no existe
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

  patch:
    tags: [items]
    summary: Actualizar información de un deseo por su ID
    description: Actualizar información de un ítem específico en la lista de deseos por su ID.
    parameters:
      - name: itemId
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              nombre:
                type: string
              descripcion:
                type: string
              imagen:
                type: string
              categoria:
                type: string
    responses:
      '200':
        description: Ítem actualizado correctamente
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Item'
      '400':
        description: Faltan datos o tienen un formato incorrecto
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: El ítem no existe
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  
  delete:
    tags: [items]
    summary: Eliminar un ítem de la lista de deseos por su id
    parameters:
      - name: itemId
        in: path
        required: true
        schema:
          type: integer
    responses:
      '204':
        description: Ítem eliminado correctamente
      '404':
        description: Ítem no encontrado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/items:
  get:
    tags: [items]
    summary: Obtener una lista de ítems con filtros opcionales. 
             Si se le pasa un childId es el concepto de lista de deseos. 
    parameters:
      - name: categoria
        in: query
        required: false
        schema:
          type: string
      - name: nombre
        in: query
        required: false
        schema:
          type: string
      - name: distancia
        in: query
        required: false
        schema:
          type: integer
      - name: childId
        in: query
        required: false
        schema:
          type: integer
    responses:
      '200':
        description: Lista de ítems obtenida correctamente
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Item'
      '400':
        description: Filtros con formato incorrecto
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '401':
        description: Niño no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  
  post:
    tags: [items]
    summary: Añadir un nuevo ítem a la lista de deseos de un niño por su id
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/crearItemRequest'
    responses:
      '201':
        description: Ítem añadido a la lista de deseos correctamente
        content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
      '400':
        description: Faltan datos o tienen un formato incorrecto
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '401':
        description: Niño no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/items/{itemId}/validar:
  patch:
    tags: [items]
    summary: Validar un ítem y cambiar su estado
    description: Cambia su estado a "publicado" una vez revisado para que esté disponible en el buscador de ítems para los donantes y
                 cambia el estado a "en transito" si el ítem ha sido entregado en el punto de entrega y corresponde a la descripción del ítem. 
                 Solo los validadores pueden realizar esta acción.
    parameters:
      - name: itemId
        in: path
        required: true
        schema:
          type: integer
    
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - estado
            properties:
              estado:
                type: string
                enum: [publicado, validando, recibido en punto de entrega, en tránsito, cancelado]
              comentario:
                type: string
                description: Comentario del validador sobre la validación del ítem
    responses:
      '200':
        description: Ítem validado correctamente
        content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
      '400':
        description: Faltan datos o tienen un formato incorrecto
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '401':
        description: Validador no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '403':
        description: Usuario autenticado no tiene permisos para validar ítems
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Ítem no encontrado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/donaciones/{itemId}:
  post:
    tags: [donacion]
    summary: Realizar una donación de un ítem específico por su id
    parameters:
      - name: itemId
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - etiquetaEnvio
            properties:
              etiqueta de envío:
                type: string
                enum: [SI, NO]
    responses:
      '201':
        description: Donación creada correctamente
        content:
            application/json:
              schema:
                $ref: '#/components/schemas/Donacion'
      '400':
        description: Faltan datos o tienen un formato incorrecto
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Ítem no encontrado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '409':
        description: El ítem ya ha sido reservado por otro usuario
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/donaciones/{userId}:
  get:
    tags: [donacion]
    summary: Obtener una lista de donaciones realizadas por el usuario
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
      - name: estado
        in: query
        required: false
        schema:
          type: string
          enum: [reservado, recibido en punto de entrega, validando, en tránsito, entregado, cancelado]
    responses:
      '200':
        description: Lista de donaciones obtenida correctamente
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Donacion'
      '401':
        description: Usuario no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      
/donaciones/{donacionId}:
  delete:
    tags: [donacion]
    summary: Cancelar una donación por su ID
    parameters:
      - name: donacionId
        in: path
        required: true
        schema:
          type: integer
    responses:
      '204':
        description: Donación cancelada correctamente
      '401':
        description: Usuario no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Donación no encontrada
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

  get:
    tags: [donacion]
    summary: Obtener detalles de una donación por su ID
    description: Estados y fechas del proceso de donación
    parameters:
      - name: donacionId
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: Detalles de la donación obtenidos correctamente
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Donacion'
      '401':
        description: Usuario no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Donación no encontrada
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      required:
        - token
        - user
      properties:
        token:
          type: string
          description: Token JWT 
        user:
          $ref: '#/components/schemas/User'

    ErrorResponse:
      type: object
      required:
        - codigo
        - mensaje
      properties:
        codigo:
          type: string
          description: Código del error
        mensaje:
          type: string
          description: Descripción del error ocurrido
        detalles:
          type: array
          description: Información adicional sobre el error (opcional)
          items:
            type: string
            required:
              - campo
              - problema
            properties:
              campo:
                type: string
                description: Nombre del campo relacionado con el error
                example: "password"
              problema:
                type: string
                description: Descripción del error específico para el campo
    
    RegisterRequest:
      type: object
      required:
        - email
        - password
        - nombre
        - apellidos
        - rol
        - direccion
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        nombre:
          type: string
        apellidos:
          type: string
        rol:
          type: string
          enum: [child, adulto, validador]
        fechaNacimiento:
          type: string
          format: date
        direccion:
          type: string

    Usuario:
      type: object
      required:
        - userId
        - email
        - nombre
        - apellidos
        - rol
        - fechaNacimiento
        - direccion
      properties:
        userId:
          type: integer
        email:
          type: string
          format: email
        nombre:
          type: string
        apellidos:
          type: string
        rol:
          type: string
          enum: [child, adulto, validador]
        fechaNacimiento:
          type: string
          format: date
        direccion:
          type: string
    
    perfilUsuario:
      type: object
      required:
        - userId
        - email
        - nombre
        - apellidos
        - direccion
        - descripcion
      properties:
        userId:
          type: integer
        email:
          type: string
          format: email
        nombre:
          type: string
        apellidos:
          type: string
        fechaNacimiento:
          type: string
          format: date
        direccion:
          type: string
          descripcion: Dirección donde se entregarán las donaciones o de donde es el donante
        descripcion:
          type: string
          descripcion: Información adicional sobre el usuario
        numeroDonaciones:
          type: integer
          descripcion: Número total de donaciones realizadas por el usuario adulto
        validador:
          type: boolean
          description: Indica si el perfil infantil está validado o no para publicar deseos
      
    Item:
      type: object
      required:
        - itemId
        - nombre
        - descripcion
        - imagen
        - categoria
        - estado
      properties:
        itemId:
          type: integer
        nombre:
          type: string
        descripcion:
          type: string
        imagen:
          type: string
          description: URL de la imagen del ítem
        categoria:
          type: string
        estado:
          type: string
          enum: [en validación, publicado, reservado, recibido en punto de entrega, validando, en tránsito, entregado, cancelado]

    crearItemRequest:
      type: object
      required:
        - nombre
        - descripcion
        - imagen
        - categoria
      properties:
        nombre:
          type: string
        descripcion:
          type: string
        imagen:
          type: string
          description: URL de la imagen del ítem
        categoria:
          type: string

    Donacion:
      type: object
      required:
        - donacionId
        - itemId
        - estado
        - createdAt
      properties:
        donacionId:
          type: integer
        itemId:
          type: integer
        estado:
          type: string
          enum: [reservado, recibido en punto de entrega, validando, en tránsito, entregado, cancelado]
        createdAt:
          type: string
          format: date-time
        estado:
          type: string
          enum: [reservado, en punto de entrega, en tránsito, entregado]
  