openapi: 3.1.0
info:
  title: Web App para la gestión de listas de deseos
  description: API REST para gestionar listas de deseos y Donaciones
  version: 1.0.0

servers:
  - url: http://localhost:5184
    description: Servidor local

tags:
  - name: Autenticación
    description: Operaciones relacionadas con la autenticación y completado de registro de los usuarios de la aplicación
  - name: users
    description: Operaciones relacionadas con los usuarios
  - name: validaciones
    description: Operaciones relacionadas con las acciones de validación realizadas por los validadores en el sistema
  - name: items
    description: Operaciones relacionadas con los ítems de las listas de deseos
  - name: donacion
    description: Operaciones relacionadas con las donaciones de ítems
  - name: insignias
    description: Operaciones relacionadas con el catálogo de insignias
  - name: fundacion
    description: Operaciones privadas relacionadas con la fundación autenticada

security:
  - bearerAuth: []

paths:

/auth/google:
  post:
    security: []
    tags: [Autenticación]
    summary: Iniciar sesión o registrarse con Google
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GoogleAuthRequest'
    responses:
      '200':
        description: Autenticación con Google completada correctamente
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleAuthResponse'
      '401':
        description: Token de Google inválido
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/auth/logout:
  post:
    tags: [Autenticación]
    summary: Cerrar sesión invalidando el token JWT del usuario
    responses:
      '204':
        description: Cierre de sesión completado correctamente
      '401':
        description: Usuario no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/auth/complete-registration:
  post:
    tags: [Autenticación]
    summary: Completar el registro de un usuario autenticado con Google
    description: Permite completar los datos obligatorios del perfil tras una autenticación inicial con Google.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CompleteRegistrationRequest'
    responses:
      '200':
        description: Registro completado correctamente
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteRegistrationResponse'
      '400':
        description: Faltan datos de entrada o tienen un formato incorrecto
        content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      '409':
        description: El email ya está registrado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/users:

  get:
    tags: [users]
    summary: Obtener lista de perfiles de usuarios con filtros opcionales
    description: >
      Devuelve una lista de perfiles visibles aplicando filtros opcionales.
      Si el usuario autenticado es una fundación y se filtra por rol=infantil,
      solo se devuelven los perfiles infantiles asociados a dicha fundación. 
      También es usado por validadores para revisar perfiles infantiles. 
      Si se filtra por rol=donante, permite buscar perfiles de donantes.
    parameters:
      - name: rol
        in: query
        required: false
        schema:
          type: string
          enum: [infantil, donante]
      - name: nombre
        in: query
        required: false
        schema:
          type: string
      - name: apellidos
        in: query
        required: false
        schema:
          type: string
      - name: ordenarPor
        in: query
        required: false
        schema:
          type: string
          enum:
          - nombreAsc
          - nombreDesc
          - edadAsc
          - edadDesc
          - numeroDonacionesDesc
          - numeroDonacionesAsc
        description: Permite ordenar los perfiles devueltos por número de donaciones o por nombre en el caso de perfiles donantes. Y por nombre o edad en el caso de perfiles infantiles.
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
        description: Número máximo de perfiles a devolver.
      - name: excluirUsuarioActual
        in: query
        required: false
        schema:
          type: boolean
        description: Permite excluir al usuario autenticado de la lista de perfiles devueltos.
    responses:
      '200':
        description: Lista de perfiles obtenida correctamente
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/PerfilUsuario'
      '400':
        description: Filtros con formato incorrecto
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '401':
        description: Usuario no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '403':
        description: Usuario autenticado no tiene permisos para consultar estos perfiles
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

  post:
    tags: [users]
    summary: Registrar un nuevo usuario infantil asociado a una fundación
    description: Solo las fundaciones pueden registrar usuarios de rol infantil asociados a su organización. 
                El email proporcionado deberá corresponder a la cuenta de Google que el usuario utilizará 
                posteriormente para autenticarse en la aplicación.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - email
              - nombre
              - apellidos
              - fechaNacimiento
              - direccion
            properties:
              email:
                type: string
                format: email
                description: Email de la cuenta Google que usará el usuario infantil
              nombre:
                type: string
              apellidos:
                type: string
              fechaNacimiento:
                type: string
                format: date
              direccion:
                type: string
    responses:
      '201':
        description: Perfil infantil registrado correctamente
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PerfilUsuario'
      '400':
        description: Faltan datos de entrada o tienen un formato incorrecto
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '401':
        description: Usuario no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '403':
        description: Usuario autenticado no tiene permisos para registrar perfiles infantiles
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '409':
        description: El email ya está registrado para otro perfil infantil o donante
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/users/{userId}:
  
  get:
    tags: [users]
    summary: Obtener el perfil de un usuario por su id
    description: >-
      Devuelve el perfil de un usuario concreto (niño o donante)a partir de su id.
      Puede ser usado por el propio usuario para consultar su perfil, por un
      donante para visitar el perfil de otro donante o el perfil del niño
      asociado a un ítem, por una fundación para ver los perfiles infantiles
      asociados a su organización y por un validador para revisar cualquier perfil.
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: Perfil de usuario obtenido correctamente
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PerfilUsuario'
      '401':
        description: Usuario no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '403':
        description: Usuario autenticado no tiene permisos para consultar este perfil
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Perfil de usuario no encontrado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

  delete:
    tags: [users]
    summary: Eliminar un perfil infantil por su id.
    description: Solo las fundaciones pueden eliminar perfiles infantiles asociados a su organización.
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
    responses:
      '204':
        description: Perfil infantil eliminado correctamente
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PerfilUsuario'
  
  patch:
    tags: [users]
    summary: Actualizar perfil de un usuario por su id
    description: Permite actualizar la información de un perfil infantil o donante por su id. 
                Solo el propio usuario o las fundaciones (en el caso de perfiles infantiles 
                asociados a su organización) pueden realizar esta acción.
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ActualizarPerfilRequest'  
    responses:
      '200':
        description: Perfil de usuario actualizado correctamente
        content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerfilUsuario'
      '400':
        description: Faltan datos de entrada o tienen un formato incorrecto
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Perfil de usuario no encontrado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/insignias:
  get:
    tags: [insignias]
    summary: Obtener el catálogo completo de insignias
    description: Devuelve todas las insignias disponibles en la aplicación, independientemente de si el usuario las ha desbloqueado o no.
    responses:
      '200':
        description: Catálogo de insignias obtenido correctamente
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Insignia'
      '401':
        description: Usuario no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/registros:
  get:
    tags: [validaciones]
    summary: Obtener registros de fundaciones con filtros opcionales
    description: >
      Devuelve la lista de registros asociados al proceso de validación de fundaciones.
      Usado para que los validadores consulten registros pendientes, aprobados o rechazados.
    parameters:
      - name: estado
        in: query
        required: false
        schema:
          type: string
          enum: [pendiente, aprobado, rechazado]
        description: >
          Filtra los registros según su estado de revisión.
          pendiente = aprobado false y fechaRevision null.
          aprobado = aprobado true y fechaRevision no null.
          rechazado = aprobado false y fechaRevision no null.
    responses:
      '200':
        description: Lista de registros obtenida correctamente
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/RegistroFundacion'
      '401':
        description: Usuario no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '403':
        description: Usuario autenticado no es un validador
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/registros/{registroId}:
  get:
    tags: [validaciones]
    summary: Obtener el estado de la solicitud de registro
    description: >
      Devuelve el detalle de una solicitud de registro.
      Las fundaciones solo pueden consultar solicitudes asociadas a su propio usuario.
      Los usuarios validadores pueden consultar cualquier solicitud pendiente de revisión.
    parameters:
      - name: registroId
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: Registro obtenido correctamente
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistroFundacion'
      '401':
        description: Usuario no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '403':
        description: El registro no pertenece al usuario autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Registro no encontrado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  patch:
    tags: [validaciones]
    summary: Validar el registro de una fundación por el id del registro
    description: Modifica el atributo aprobado a true para que pueda empezar a gestionar perfiles infantiles. 
                 Solo los validadores pueden realizar esta acción.
    parameters:
      - name: registroId
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ActualizarRegistroRequest'
    responses:
      '200':
        description: Registro validado correctamente
        content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistroFundacion'
      '400':
        description: Datos inválidos
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '401':
        description: Validador no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '403':
        description: Usuario autenticado no es un validador
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Registro no encontrado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/validaciones/ultimas:
  get:
    tags: [validaciones]
    summary: Obtener últimas acciones realizadas por el validador autenticado
    description: >
      Devuelve un resumen de las últimas acciones de validación realizadas en el sistema.
      Las acciones pueden estar asociadas a un registro de fundación, a un ítem pendiente
      de publicación o al estado de validación de una donación. 
    parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 5
        description: Número máximo de acciones recientes a devolver.
    responses:
      '200':
        description: Últimas acciones de validación obtenidas correctamente
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/UltimaAccionValidacion'

      '401':
        description: Usuario no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

      '403':
        description: Usuario autenticado no es un validador
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/items/{itemId}:
  get:
    tags: [items]
    summary: Obtener información detallada de un ítem por su id
    description: Obtener información detallada de un ítem, ya sea de 
                 la lista de deseos o del buscador de ítems
    parameters:
      - name: itemId
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: Ítem encontrado correctamente
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Item'
      '404':
        description: El ítem no existe
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

  patch:
    tags: [items]
    summary: Actualizar información de un deseo por su ID
    description: Actualizar información de un ítem específico en la lista de deseos por su ID.
    parameters:
      - name: itemId
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              nombre:
                type: string
              description:
                type: string
              imagen:
                type: string
              categoria:
                type: string
    responses:
      '200':
        description: Ítem actualizado correctamente
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Item'
      '400':
        description: Faltan datos o tienen un formato incorrecto
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: El ítem no existe
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  
  delete:
    tags: [items]
    summary: Eliminar un ítem de la lista de deseos por su id
    parameters:
      - name: itemId
        in: path
        required: true
        schema:
          type: integer
    responses:
      '204':
        description: Ítem eliminado correctamente
      '404':
        description: Ítem no encontrado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/items:
  get:
    tags: [items]
    summary: Obtener una lista de ítems con filtros opcionales. 
             Si se le pasa un userId es el concepto de lista de deseos. 
    parameters:
      - name: publicado
        in: query
        required: false
        schema:
          type: boolean
        description: Filtrar ítems publicados o pendientes de validación
      - name: categoria
        in: query
        required: false
        schema:
          type: string
      - name: urgente
        in: query
        required: false
        schema:
          type: boolean
        description: Filtrar ítems urgentes. Un ítem es urgente cuando falta un mes o menos para su caducidad
      - name: nombre
        in: query
        required: false
        schema:
          type: string
      - name: favorito
        in: query
        required: false
        schema:
          type: boolean
        description: Filtrar ítems marcados como favoritos por el usuario autenticado
      - name: ordenarPor
        in: query
        required: false
        schema:
          type: string
          enum: [distancia, caducidad, fechaPublicacion]
        description: Permite ordenar los ítems por distancia, fecha de caducidad o fecha de publicación
      - name: userId
        in: query
        required: false
        schema:
          type: integer
        description: Items de la lista de deseos de un niño. La lista de deseos solo tiene los items que aún no se han asociado a una donación. 
                    Si además publicado es true, se devuelven solo los ítems publicados de la lista de deseos. Si publicado es false, se devuelven solo los ítems pendientes de validación de la lista de deseos.
    responses:
      '200':
        description: Lista de ítems obtenida correctamente
        content:
          application/json:
            schema:
                $ref: '#/components/schemas/ItemsResponse'
      '400':
        description: Filtros con formato incorrecto
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '401':
        description: Niño no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  
  post:
    tags: [items]
    summary: Añadir un nuevo ítem a la lista de deseos de un niño
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CrearItemRequest'
    responses:
      '201':
        description: Ítem añadido a la lista de deseos correctamente
        content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
      '400':
        description: Faltan datos o tienen un formato incorrecto
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '401':
        description: Niño no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/items/{itemId}/favorito:
  put:
    tags: [items]
    summary: Marcar un ítem como favorito
    parameters:
      - name: itemId
        in: path
        required: true
        schema:
          type: integer
    responses:
      '204':
        description: Ítem marcado como favorito correctamente
      '401':
        description: Usuario no autenticado
      '404':
        description: Ítem no encontrado

  delete:
    tags: [items]
    summary: Quitar un ítem de favoritos
    parameters:
      - name: itemId
        in: path
        required: true
        schema:
          type: integer
    responses:
      '204':
        description: Ítem eliminado de favoritos correctamente
      '401':
        description: Usuario no autenticado
      '404':
        description: Ítem no encontrado

/items/{itemId}/validar:
  patch:
    tags: [items]
    summary: Validar un ítem antes de su publicación
    description: >-
      Permite al validador revisar un ítem creado por un niño.
      Si se aprueba, el ítem queda publicado. Si se rechaza, seguirá sin publicarse
      y se guardará el comentario de revisión.
    parameters:
      - name: itemId
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidarItemRequest'
    responses:
      '200':
        description: Ítem revisado correctamente
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Item'
      '400':
        description: Faltan datos o tienen un formato incorrecto
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '401':
        description: Validador no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '403':
        description: Usuario autenticado no tiene permisos para validar ítems
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Ítem no encontrado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/donaciones/{itemId}:
  post:
    tags: [donacion]
    summary: Realizar una donación de un ítem específico por su id
    parameters:
      - name: itemId
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CrearDonacionRequest'
    responses:
      '201':
        description: Donación creada correctamente
        content:
            application/json:
              schema:
                $ref: '#/components/schemas/Donacion'
      '400':
        description: Faltan datos o tienen un formato incorrecto
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Ítem no encontrado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '409':
        description: El ítem ya ha sido reservado por otro usuario
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/donaciones:
  get:
    tags: [donacion]
    summary: Obtener la lista de donaciones realizadas por el usuario autenticado
    parameters:
      - name: estado
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: array
          items:
            type: string
            enum: [reservado, recibido, validacion, transito, entregado, cancelado]
        description: >
          Lista de estados por los que filtrar las donaciones.
          Para consultar donaciones en curso se enviarán los estados:
          reservado, recibido, validacion y transito.
          En la vista del validador, las donaciones aprobadas incluyen los estados
          transito y entregado, ya que ambas han superado la revisión previa al envío.
      - name: origenCancelacion
        in: query
        required: false
        schema:
          type: string
          enum: [donante, validador]
        description: >
          Permite filtrar las donaciones canceladas según el origen de la cancelación.
          donante indica que la donación fue cancelada por el donante antes de ser recibida
          en el punto de entrega. validador indica que la donación fue rechazada por el
          validador después de haber sido recibida y revisada.
      - name: ordenarPor
        schema:
          type: string
          enum: [fechaDesc, fechaAsc]
      - name: limit
        schema:
          type: integer
          minimum: 1
    responses:
      '200':
        description: Lista de donaciones obtenida correctamente
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Donacion'
      '401':
        description: Usuario no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/donaciones/mensajes-no-leidos:
  get:
    tags: [donacion]
    summary: Obtener donaciones con mensajes no leídos del donante autenticado
    description: Devuelve las donaciones realizadas por el usuario donante autenticado que tienen un mensaje de agradecimiento pendiente de leer.
    responses:
      '200':
        description: Donaciones con mensajes no leídos obtenidas correctamente
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Donacion'
      '401':
        description: Usuario no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '403':
        description: Usuario autenticado no tiene permisos para consultar estos mensajes
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/donaciones/mis-deseos:
  get:
    tags: [donacion]
    summary: Obtener donaciones asociadas a los deseos del niño autenticado
    description: >
      Devuelve las donaciones asociadas a los ítems de la lista de deseos del
      usuario infantil autenticado. Permite filtrar las donaciones por grupo de
      estado para consultar deseos en curso, entregados o cancelados.
    parameters:
    - name: estado
      in: query
      required: false
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
          enum: [reservado, recibido, validacion, transito, entregado, cancelado]
      description: >
        Lista de estados por los que filtrar las donaciones.
        Para consultar donaciones en curso se enviarán los estados:
        reservado, recibido, validacion y transito.
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
      description: Número máximo de donaciones a devolver.
    responses:
      '200':
        description: Donaciones asociadas a los deseos del niño obtenidas correctamente
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Donacion'
      '401':
        description: Usuario no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '403':
        description: Usuario autenticado no tiene permisos para consultar donaciones asociadas a deseos infantiles
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      
/donaciones/{donacionId}:
  delete:
    tags: [donacion]
    summary: Cancelar una donación por su ID
    parameters:
      - name: donacionId
        in: path
        required: true
        schema:
          type: integer
    responses:
      '204':
        description: Donación cancelada correctamente
      '401':
        description: Usuario no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Donación no encontrada
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

  get:
    tags: [donacion]
    summary: Obtener detalles de una donación por su ID
    description: Estados y fechas del proceso de donación
    parameters:
      - name: donacionId
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: Detalles de la donación obtenidos correctamente
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Donacion'
      '401':
        description: Usuario no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Donación no encontrada
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  
  patch:
    tags: [donacion]
    summary: Actualizar una donación
    description: Permite al niño añadir su carta de agradecimiento. Y al donante marcar el mensaje como leído.

    parameters:
      - name: donacionId
        in: path
        required: true
        schema:
          type: integer

    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Mensaje'
    responses:
      '200':
        description: Carta actualizada correctamente
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Donacion'


/donaciones/{donacionId}/validar:
  patch:
    tags: [donacion]
    summary: Validar una donación antes de pasarla a tránsito
    description: Permite al validador confirmar que la donación ha sido recibida correctamente y puede pasar a estado tránsito.
    parameters:
      - name: donacionId
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidarDonacionRequest'
    responses:
      '200':
        description: Donación validada correctamente
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Donacion'
      '400':
        description: Faltan datos o tienen un formato incorrecto
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '401':
        description: Validador no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '403':
        description: Usuario autenticado no tiene permisos para validar donaciones
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Donación no encontrada
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/fundacion/estadisticas:
  get:
    tags: [fundacion]
    summary: Obtener resumen de la fundación autenticada
    description: >
      Devuelve métricas agregadas de los perfiles infantiles asociados
      a la fundación autenticada. Esta información es privada y solo
      puede ser consultada por la propia fundación.
    responses:
      '200':
        description: Resumen obtenido correctamente
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResumenFundacion'
      '401':
        description: Usuario no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '403':
        description: El usuario autenticado no es una fundación
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'


components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    GoogleAuthRequest:
      type: object
      required:
        - idToken
      properties:
        idToken:
          type: string
          description: ID token devuelto por Google Sign-In

    GoogleAuthResponse:
      type: object
      required:
        - token
        - user
        - perfilCompletado
      properties:
        token:
          type: string
        googleProfile:
          $ref: '#/components/schemas/GoogleProfile'
        perfilCompletado:
          type: boolean
          description: Indica si el usuario ha completado su perfil después de autenticarse con Google. 
                       Si es false, el frontend redirige al usuario a la pantalla de completado de perfil.
        user:
          $ref: '#/components/schemas/Usuario'
        registroId:
          type: integer
          nullable: true
          description: Id de la solicitud asociada al usuario si es rol = fundación.
    
    GoogleProfile:
      type: object
      description: Datos básicos devueltos por Google durante la autenticación
      required:
        - sub
        - email
        - email_verified
        - name
      properties:
        sub:
          type: string
          description: Identificador único del usuario en Google
        email:
          type: string
          format: email
        email_verified:
          type: boolean
        name:
          type: string
          description: Nombre completo devuelto por Google
        given_name:
          type: string
          description: Nombre del usuario
        family_name:
          type: string
          description: Apellidos del usuario
        picture:
          type: string
          format: uri
          description: URL de la imagen de perfil de Google
    
    CompleteRegistrationResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: '#/components/schemas/Usuario'
        registroId:
          type: integer
          nullable: true
          description: Id de la solicitud de validación creada cuando el usuario registrado es una fundación.

    ErrorResponse:
      type: object
      required:
        - codigo
        - mensaje
      properties:
        codigo:
          type: string
          description: Código del error
        mensaje:
          type: string
          description: Descripción del error ocurrido
        detalles:
          type: array
          description: Información adicional sobre el error (opcional)
          items:
            type: object
            required:
              - campo
              - problema
            properties:
              campo:
                type: string
                description: Nombre del campo relacionado con el error
                example: "cuenta google"
              problema:
                type: string
                description: Descripción del error específico para el campo
    
    CompleteRegistrationRequest:
      type: object
      required:
        - rol
        - nombre
      properties:
        rol:
          type: string
          enum: [fundacion, donante]
        nombre:
          type: string
        apellidos:
          type: string
        direccion:
          type: string

    Usuario:
      type: object
      description: Representa la cuenta del sistema
      required:
        - userId
        - email
      properties:
        userId:
          type: integer
        email:
          type: string
          format: email
        nombre:
          type: string
        apellidos:
          type: string
        rol:
          type: string
          enum: [infantil, donante, fundacion, validador]
        fechaNacimiento:
          type: string
          format: date
        direccion:
          type: string
    
    ActualizarPerfilRequest:
          type: object
          properties:
            nombre:
              type: string
            apellidos:
              type: string
            fechaNacimiento:
              type: string
              format: date
            direccion:
              type: string
            descripcion:
              type: string
            imagenPerfil:
              type: string
              format: uri
              description: URL de la imagen de perfil del usuario

    PerfilUsuario:
      type: object
      description: representa el perfil visible o consultable en la aplicación.
      required:
        - userId
        - rol
        - email
        - nombre
        - apellidos
        - direccion
        - descripcion
        - insigniasDesbloqueadas
      properties:
        userId:
          type: integer
        rol:
          type: string
          enum: [infantil, donante]
        email:
          type: string
          format: email
        nombre:
          type: string
        apellidos:
          type: string
        fechaNacimiento:
          type: string
          format: date
        fundacionAsociada:
          type: string
          description: Nombre de la fundación asociada al perfil infantil. Solo se devuelve para perfiles infantiles.
        direccion:
          type: string
          description: Dirección donde se entregarán las donaciones o de donde es el donante
        descripcion:
          type: string
          descripcion: Información adicional sobre el usuario
        imagenPerfil:
          type: string
          format: uri
          description: URL de la imagen de perfil del usuario
        numeroDonaciones:
          type: integer
          descripcion: Número total de donaciones realizadas por el usuario donante
        donacionesVisibles:
          type: array
          description: Donaciones entregadas visibles en el perfil público del donante
          items:
            $ref: '#/components/schemas/DonacionVisible'
        insigniasDesbloqueadas:
          type: array
          description: IDs de las insignias desbloqueadas por el usuario donante
          items:
            type: integer
        validado:
          type: boolean
          description: Indica si el perfil infantil está validado o no para publicar deseos
    
    DonacionVisible:
      type: object
      required:
        - donacionId
        - itemId
        - nombreItem
        - imagenItem
      properties:
        donacionId:
          type: integer
        itemId:
          type: integer
        nombreItem:
          type: string
        imagenItem:
          type: string

    Insignia:
      type: object
      required:
        - insigniaId
        - nombre
        - descripcion
        - imagen
      properties:
        insigniaId:
          type: integer
        nombre:
          type: string
        descripcion:
          type: string
        imagen:
          type: string
          format: uri
          description: URL del icono decorativo de la insignia

    RegistroFundacion:
      type: object
      required:
        - registroId
        - fechaSolicitud
        - aprobado
        - userId
      properties:
        registroId:
          type: integer
        fechaSolicitud:
          type: string
          format: date
        aprobado:
          type: boolean
        fechaRevision:
          type: string
          format: date
        comentarioRevision:
          type: string
        userId:
          type: integer

    ActualizarRegistroRequest:
      type: object
      required:
        - aprobado
      properties:
        aprobado:
          type: boolean
          description: Indica si el registro de la fundación ha sido aprobado o rechazado
        comentarioRevision:
          type: string
          description: Comentario opcional del validador sobre la validación del registro
    
    ItemsResponse:
      type: object
      required:
        - totalItems
        - items
      properties:
        totalItems:
          type: integer
          description: Número total de ítems devueltos según los filtros aplicados
          example: 8

        maxItemsListaDeseos:
          type: integer
          nullable: true
          description: Número máximo de ítems permitidos en la lista de deseos. 
            Solo se devuelve cuando se consulta una lista de deseos con userId
          example: 10

        totalItemsListaDeseos:
          type: integer
          nullable: true
          description: Número total de ítems que tiene el niño en su lista de deseos sin aplicar filtros. 
            Solo se devuelve cuando se consulta una lista de deseos con userId
          example: 4

        items:
          type: array
          items:
            $ref: '#/components/schemas/Item'

    Item:
      type: object
      required:
        - itemId
        - nombre
        - imagen
        - categoria
        - fechaCreacion
        - publicado
      properties:
        itemId:
          type: integer
        nombre:
          type: string
        descripcion:
          type: string
        imagen:
          type: string
          description: URL de la imagen del ítem
        categoria:
          type: string
        favorito:
          type: boolean
          description: Indica si el ítem está marcado como favorito por el usuario autenticado
        fechaCreacion:
          type: string
          format: date-time
        caducaEn:
          type: integer
          nullable: true
          description: Número de días restantes hasta la caducidad del ítem
        urgente:
          type: boolean
          description: Indica si el ítem es urgente. Será true cuando falte un mes o menos para su fecha de caducidad
        distanciaKm:
          type: number
          format: float
          description: Distancia aproximada en kilómetros entre el donante autenticado y el niño que publicó el ítem
        publicado:
          type: boolean
          description: Indica si el ítem está publicado o no
        fechaRevision:
          type: string
          format: date-time
          nullable: true
          description: Fecha de la revisión del ítem por un validador antes de su publicación. También se usa para saber la fecha de publicación.
        comentarioRevision:
          type: string
          description: Comentario del validador sobre la validación del ítem
      

    CrearItemRequest:
      type: object
      required:
        - nombre
        - descripcion
        - imagen
        - categoria
      properties:
        nombre:
          type: string
        descripcion:
          type: string
        imagen:
          type: string
          description: URL de la imagen del ítem
        categoria:
          type: string
          enum: [juguetes, ropa, material_escolar, libros, deporte, otros]

    ValidarItemRequest:
      type: object
      required:
        - publicado
      properties:
        publicado:
          type: boolean
          description: Indica si el ítem queda publicado tras la revisión del validador
        comentario:
          type: string
          description: Comentario opcional del validador sobre la revisión del ítem

    Donacion:
      type: object
      required:
        - donacionId
        - itemId
        - estadoActual
        - createdAt
      properties:
        donacionId:
          type: integer
        itemId:
          type: integer
        estadoActual:
          type: string
          enum: [reservado, recibido, validacion, transito, entregado, cancelado]
        createdAt:
          type: string
          format: date-time
        fechaEstimadaEntrega:
          type: string
          format: date-time
          nullable: true
        etiquetaEnvio:
          type: string
          enum: [SI, NO]
        seguimiento:
          type: array
          items:
            $ref: '#/components/schemas/SeguimientoDonacion'
        transportista:
          $ref: '#/components/schemas/Transportista'
        mensaje:
          $ref: '#/components/schemas/Mensaje'
          description: Mensaje opcional del niño al donante como agradecimiento
        origenCancelacion:
          type: string
          enum: [donante, validador]
          nullable: true
          description: >
            Indica el origen de la cancelación cuando estadoActual es cancelado.
            Será donante si la cancelación fue realizada por el donante antes de la entrega
            en fundación, y validador si la donación fue rechazada durante la revisión.
    
    CrearDonacionRequest:
      type: object
      required:
        - etiquetaEnvio
      properties:
        etiquetaEnvio:
          type: string
          enum: [SI, NO]

    SeguimientoDonacion:
      type: object
      required:
        - key
        - label
        - description
      properties:
        key:
          type: string
          enum: [reservado, recibido, validacion, transito, entregado, cancelado]
        label:
          type: string
        fecha:
          type: string
          format: date-time
          nullable: true
        description:
          type: string
    
    Transportista:
      type: object
      required:
        - nombre
        - telefonoContacto
        - emailContacto
      properties:
        nombre:
          type: string
        telefonoContacto:
          type: string
        emailContacto:
          type: string
          format: email
     
    ValidarDonacionRequest:
      type: object
      required:
        - estado
      properties:
        estado:
          type: string
          enum: [transito, cancelado]
          description: Estado resultante tras la validación de la donación
        comentarioRevision:
          type: string
          nullable: true
          description: Comentario opcional del validador sobre la revisión de la donación
    
    Mensaje:
      type: object
      description: Mensaje de agradecimiento enviado por el niño cuando la donación ya ha sido entregada.
      required:
        - contenido
      properties:
        contenido:
          type: string
        fechaEnvio:
          type: string
          format: date-time
        fechaLectura:
          type: string
          format: date-time
          description: Fecha en la que el donante leyó el mensaje. Se actualiza automáticamente al consultar los detalles de la donación para el donante.
  
    ResumenFundacion:
      type: object
      required:
        - totalPerfilesInfantiles
        - totalDeseosPublicados
        - totalDeseosCumplidos
      properties:
        totalPerfilesInfantiles:
          type: integer
          description: Número total de perfiles infantiles asociados a la fundación.
        totalDeseosPublicados:
          type: integer
          description: Número total de deseos publicados por los perfiles infantiles asociados.
        totalDeseosCumplidos:
          type: integer
          description: Número total de deseos cumplidos de los perfiles infantiles asociados.
    
    UltimaAccionValidacion:
      type: object
      required:
        - entidadValidada
        - entidadId
        - resultado
        - fechaRevision
      properties:
        entidadValidada:
          type: string
          enum: [registro, item, donacion]
          description: >
            Indica sobre qué elemento se realizó la validación. Es un campo derivado
            usado únicamente para unificar en el panel acciones procedentes de registros,
            ítems y donaciones.
        entidadId:
          type: integer
          description: >
            Identificador del registro, ítem o donación asociado a la acción.
        nombre:
          type: string
          description: Nombre de la fundación o del item validado.
        resultado:
          type: string
          enum: [aprobado, rechazado, validado_envio]
          description: Resultado de la revisión realizada.
        fechaRevision:
          type: string
          format: date-time
          description: Fecha en la que se realizó la revisión.