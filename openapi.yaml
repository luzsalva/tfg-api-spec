openapi: 3.1.0
info:
  title: Web App para la gestión de listas de deseos
  description: API REST para gestionar listas de deseos y Donaciones
  version: 1.0.0

servers:
  - url: http://localhost:5184
    description: Servidor local

tags:
  - name: Autenticación
    description: Operaciones relacionadas con la autenticación de usuarios de rol donante y fundación
  - name: users
    description: Operaciones relacionadas con los usuarios
  - name: registros
    description: Operaciones relacionadas con la validación de registros de fundaciones. Solo para validadores
  - name: items
    description: Operaciones relacionadas con los ítems de las listas de deseos
  - name: donacion
    description: Operaciones relacionadas con las donaciones de ítems

security:
  - bearerAuth: []

paths:

/auth/login:
  post:
    security: []
    tags: [Autenticación]
    summary: Iniciar sesión 
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LoginRequest'
    responses:
      '200':
        description: Inicio de sesión completado correctamente
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginResponse'
      '401':
        description: Credenciales inválidas
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/auth/logout:
  post:
    security: []
    tags: [Autenticación]
    summary: Cerrar sesión invalidando el token JWT del usuario
    responses:
      '204':
        description: Cierre de sesión completado correctamente
      '401':
        description: Usuario no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/auth/register:
  post:
    tags: [Autenticación]
    summary: Registro público de un nuevo usuario (fundación o donante)
    description: El campo rol determina el tipo de usuario a registrar
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RegisterRequest'
    responses:
      '201':
        description: Usuario registrado correctamente
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Usuario'
      '400':
        description: Faltan datos de entrada o tienen un formato incorrecto
        content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      '409':
        description: El email ya está registrado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/users:

  get:
    tags: [users]
    summary: Obtener lista de perfiles de usuarios con filtros opcionales
    description: Devuelve una lista de perfiles VISIBLES de usuarios aplicando filtros opcionales.
                Si se filtra por rol=child, este endpoint puede ser usado por fundaciones
                para consultar sus perfiles infantiles asociados o por validadores para
                revisar perfiles infantiles. Si se filtra por rol=donante, permite buscar
                perfiles de donantes, incluyendo filtros como número mínimo de donaciones.
    parameters:
      - name: rol
        in: query
        required: false
        schema:
          type: string
          enum: [child, donante]
      - name: nombre
        in: query
        required: false
        schema:
          type: string
      - name: apellidos
        in: query
        required: false
        schema:
          type: string
      - name: minDonaciones
        in: query
        required: false
        schema:
          type: integer
        description: Filtrar perfiles de donantes por número mínimo de donaciones realizadas
    responses:
      '200':
        description: Lista de perfiles obtenida correctamente
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/perfilUsuario'
      '400':
        description: Filtros con formato incorrecto
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '401':
        description: Usuario no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '403':
        description: Usuario autenticado no tiene permisos para consultar estos perfiles
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

  post:
    tags: [users]
    summary: Registrar un nuevo perfil infantil asociado a una fundación
    description: Solo las fundaciones pueden registrar perfiles infantiles asociados a su organización.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - email
              - nombre
              - apellidos
              - fechaNacimiento
              - direccion
            properties:
              email:
                type: string
                format: email
              nombre:
                type: string
              apellidos:
                type: string
              fechaNacimiento:
                type: string
                format: date
              direccion:
                type: string
    responses:
      '201':
        description: Perfil infantil registrado correctamente
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PerfilUsuario'
      '400':
        description: Faltan datos de entrada o tienen un formato incorrecto
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '401':
        description: Usuario no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '403':
        description: Usuario autenticado no tiene permisos para registrar perfiles infantiles
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '409':
        description: El email ya está registrado para otro perfil infantil o donante
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/users/{userId}:
  
  get:
    tags: [users]
    summary: Obtener el perfil de un usuario por su id
    description: >-
      Devuelve el perfil de un usuario concreto (niño o donante)a partir de su id.
      Puede ser usado por el propio usuario para consultar su perfil, por un
      donante para visitar el perfil de otro donante o el perfil del niño
      asociado a un ítem, por una fundación para ver los perfiles infantiles
      asociados a su organización y por un validador para revisar cualquier perfil.
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: Perfil de usuario obtenido correctamente
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PerfilUsuario'
      '401':
        description: Usuario no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '403':
        description: Usuario autenticado no tiene permisos para consultar este perfil
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Perfil de usuario no encontrado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

  delete:
    tags: [users]
    summary: Eliminar un perfil infantil por su id.
    description: Solo las fundaciones pueden eliminar perfiles infantiles asociados a su organización.
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
    responses:
      '204':
        description: Perfil infantil eliminado correctamente
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PerfilUsuario'
  
  patch:
    tags: [users]
    summary: Actualizar perfil de un usuario por su id
    description: Permite actualizar la información de un perfil infantil o donante por su id. 
                Solo el propio usuario o las fundaciones (en el caso de perfiles infantiles 
                asociados a su organización) pueden realizar esta acción.
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ActualizarPerfilRequest'  
    responses:
      '200':
        description: Perfil de usuario actualizado correctamente
        content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerfilUsuario'
      '400':
        description: Faltan datos de entrada o tienen un formato incorrecto
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Perfil de usuario no encontrado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/registros:
  
  get:
    tags: [registros]
    summary: Obtener registros de fundaciones con filtros opcionales
    description: Devuelve la lista de registros asociados al proceso de validación de fundaciones.
                Usado para que los validadores consulten los registros
                pendientes de revisión en su panel.
    parameters:
      - name: aprobado
        in: query
        required: false
        schema:
          type: boolean
        description: Filtrar registros por su estado de aprobación (true=aprobados, false=pendientes o rechazados)
    responses:
      '200':
        description: Lista de registros obtenida correctamente
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/RegistroFundacion'
      '401':
        description: Usuario no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '403':
        description: Usuario autenticado no es un validador
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/registros/{registroId}:
  patch:
    tags: [registros]
    summary: Validar el registro de una fundación por el id del registro
    description: Modifica el atributo aprobado a true para que pueda empezar a gestionar perfiles infantiles. 
                 Solo los validadores pueden realizar esta acción.
    parameters:
      - name: registroId
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ActualizarRegistroRequest'
    responses:
      '200':
        description: Registro validado correctamente
        content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistroFundacion'
      '400':
        description: Datos inválidos
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '401':
        description: Validador no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '403':
        description: Usuario autenticado no es un validador
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Registro no encontrado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/items/{itemId}:
  get:
    tags: [items]
    summary: Obtener información detallada de un ítem por su id
    description: Obtener información detallada de un ítem, ya sea de 
                 la lista de deseos o del buscador de ítems
    parameters:
      - name: itemId
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: Ítem encontrado correctamente
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Item'
      '404':
        description: El ítem no existe
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

  patch:
    tags: [items]
    summary: Actualizar información de un deseo por su ID
    description: Actualizar información de un ítem específico en la lista de deseos por su ID.
    parameters:
      - name: itemId
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              nombre:
                type: string
              descripcion:
                type: string
              imagen:
                type: string
              categoria:
                type: string
    responses:
      '200':
        description: Ítem actualizado correctamente
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Item'
      '400':
        description: Faltan datos o tienen un formato incorrecto
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: El ítem no existe
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  
  delete:
    tags: [items]
    summary: Eliminar un ítem de la lista de deseos por su id
    parameters:
      - name: itemId
        in: path
        required: true
        schema:
          type: integer
    responses:
      '204':
        description: Ítem eliminado correctamente
      '404':
        description: Ítem no encontrado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/items:
  get:
    tags: [items]
    summary: Obtener una lista de ítems con filtros opcionales. 
             Si se le pasa un userId es el concepto de lista de deseos. 
    parameters:
      - name: categoria
        in: query
        required: false
        schema:
          type: string
      - name: nombre
        in: query
        required: false
        schema:
          type: string
      - name: distancia
        in: query
        required: false
        schema:
          type: integer
      - name: userId
        in: query
        required: false
        schema:
          type: integer
      - name: estado
        in: query
        required: false
        schema:
          type: string
          enum: [en validación, publicado, reservado, recibido en punto de entrega, en tránsito, entregado, cancelado]
        description: Filtrar por estado del ítem en la lista de deseos, en el buscador de ítems o en el panel del validador.
    responses:
      '200':
        description: Lista de ítems obtenida correctamente
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Item'
      '400':
        description: Filtros con formato incorrecto
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '401':
        description: Niño no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
  
  post:
    tags: [items]
    summary: Añadir un nuevo ítem a la lista de deseos de un niño
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CrearItemRequest'
    responses:
      '201':
        description: Ítem añadido a la lista de deseos correctamente
        content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
      '400':
        description: Faltan datos o tienen un formato incorrecto
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '401':
        description: Niño no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/items/{itemId}/validar:
  patch:
    tags: [items]
    summary: Validar un ítem o confirmar un cambio de estado sujeto a revisión
    description: Permite al validador aprobar un ítem para su publicación o confirmar
                 estados que requieren revisión manual, como la recepción en
                 punto de entrega o el paso a envío. Solo los validadores pueden realizar esta acción.
    parameters:
      - name: itemId
        in: path
        required: true
        schema:
          type: integer   
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidarItemRequest'
    responses:
      '200':
        description: Ítem validado correctamente
        content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
      '400':
        description: Faltan datos o tienen un formato incorrecto
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '401':
        description: Validador no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '403':
        description: Usuario autenticado no tiene permisos para validar ítems
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Ítem no encontrado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/donaciones/{itemId}:
  post:
    tags: [donacion]
    summary: Realizar una donación de un ítem específico por su id
    parameters:
      - name: itemId
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CrearDonacionRequest'
    responses:
      '201':
        description: Donación creada correctamente
        content:
            application/json:
              schema:
                $ref: '#/components/schemas/Donacion'
      '400':
        description: Faltan datos o tienen un formato incorrecto
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Ítem no encontrado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '409':
        description: El ítem ya ha sido reservado por otro usuario
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/donaciones:
  get:
    tags: [donacion]
    summary: Obtener una lista de donaciones realizadas por el usuario
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
      - name: estado
        in: query
        required: false
        schema:
          type: string
          enum: [reservado, recibido en punto de entrega, en validación, en tránsito, entregado, cancelado]
    responses:
      '200':
        description: Lista de donaciones obtenida correctamente
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Donacion'
      '401':
        description: Usuario no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      
/donaciones/{donacionId}:
  delete:
    tags: [donacion]
    summary: Cancelar una donación por su ID
    parameters:
      - name: donacionId
        in: path
        required: true
        schema:
          type: integer
    responses:
      '204':
        description: Donación cancelada correctamente
      '401':
        description: Usuario no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Donación no encontrada
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

  get:
    tags: [donacion]
    summary: Obtener detalles de una donación por su ID
    description: Estados y fechas del proceso de donación
    parameters:
      - name: donacionId
        in: path
        required: true
        schema:
          type: integer
    responses:
      '200':
        description: Detalles de la donación obtenidos correctamente
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Donacion'
      '401':
        description: Usuario no autenticado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Donación no encontrada
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      required:
        - token
        - user
      properties:
        token:
          type: string
          description: Token JWT 
        user:
          $ref: '#/components/schemas/Usuario'

    ErrorResponse:
      type: object
      required:
        - codigo
        - mensaje
      properties:
        codigo:
          type: string
          description: Código del error
        mensaje:
          type: string
          description: Descripción del error ocurrido
        detalles:
          type: array
          description: Información adicional sobre el error (opcional)
          items:
            type: object
            required:
              - campo
              - problema
            properties:
              campo:
                type: string
                description: Nombre del campo relacionado con el error
                example: "password"
              problema:
                type: string
                description: Descripción del error específico para el campo
    
    RegisterRequest:
      type: object
      required:
        - email
        - password
        - nombre
        - apellidos
        - rol
        - direccion
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        nombre:
          type: string
        apellidos:
          type: string
        rol:
          type: string
          enum: [fundación, donante]
        direccion:
          type: string
        fechaNacimiento:
          type: string
          format: date
          description: Fecha de nacimiento del usuario, solo para perfiles infantiles

    Usuario:
      type: object
      description: Representa la cuenta del sistema
      required:
        - userId
        - email
        - nombre
        - apellidos
        - rol
        - direccion
      properties:
        userId:
          type: integer
        email:
          type: string
          format: email
        nombre:
          type: string
        apellidos:
          type: string
        rol:
          type: string
          enum: [child, donante, fundación, validador]
        fechaNacimiento:
          type: string
          format: date
        direccion:
          type: string
    
    ActualizarPerfilRequest:
          type: object
          properties:
            nombre:
              type: string
            apellidos:
              type: string
            fechaNacimiento:
              type: string
              format: date
            direccion:
              type: string
            descripcion:
              type: string
            imagenPerfil:
              type: string
              format: uri
              description: URL de la imagen de perfil del usuario

    PerfilUsuario:
      type: object
      description: representa el perfil visible o consultable en la aplicación.
      required:
        - userId
        - rol
        - email
        - nombre
        - apellidos
        - direccion
        - descripcion
      properties:
        userId:
          type: integer
        rol:
          type: string
          enum: [child, donante]
        email:
          type: string
          format: email
        nombre:
          type: string
        apellidos:
          type: string
        fechaNacimiento:
          type: string
          format: date
        direccion:
          type: string
          descripcion: Dirección donde se entregarán las donaciones o de donde es el donante
        descripcion:
          type: string
          descripcion: Información adicional sobre el usuario
        numeroDonaciones:
          type: integer
          descripcion: Número total de donaciones realizadas por el usuario donante
        validado:
          type: boolean
          description: Indica si el perfil infantil está validado o no para publicar deseos
    
    RegistroFundacion:
      type: object
      required:
        - registroId
        - fechaSolicitud
        - aprobado
        - userId
      properties:
        registroId:
          type: integer
        fechaSolicitud:
          type: string
          format: date
        aprobado:
          type: boolean
        fechaRevision:
          type: string
          format: date
        comentarioRevision:
          type: string
        userId:
          type: integer

    ActualizarRegistroRequest:
      type: object
      required:
        - aprobado
      properties:
        aprobado:
          type: boolean
          description: Indica si el registro de la fundación ha sido aprobado o rechazado
        comentarioRevision:
          type: string
          description: Comentario opcional del validador sobre la validación del registro
    
    Item:
      type: object
      required:
        - itemId
        - nombre
        - descripcion
        - imagen
